            <div class="grid grid-cols-3 gap-3">

                    <i class="fas fa-chart-line text-2xl text-red-500 mb-2"></i>
                    <p class="text-[11px] font-bold">الأسعار</p>
                </div>
                <div onclick="showView('education')" class="grid-icon bg-white p-4 rounded-3xl shadow-sm text-center">
                    <i class="fas fa-graduation-cap text-2xl text-purple-500 mb-2"></i>

                    <i class="fas fa-fire-extinguisher"></i> إطفاء

            <span class="text-[9px] font-bold mt-1">الرئيسية</span>
        </button>

        </button>

    <script>
        const database = {
            shops: [
                { name: 'أسواق الفيحاء', sub: 'مواد غذائية - جملة ومفرد', tel: '0770XXXXXXX', cat: 'بقالة', color: 'bg-blue-100 text-blue-600' },

            services: [
                { name: 'أبو جاسم', sub: 'تأسيسات صحية ومجاري', tel: '0771XXXXXXX', cat: 'سباك', color: 'bg-cyan-100 text-cyan-600' },
                { name: 'ياسين الكهربائي', sub: 'صيانة مولدات وتأسيسات', tel: '0780XXXXXXX', cat: 'كهرباء', color: 'bg-amber-100 text-amber-600' }
            ],
            transport: [
                { name: 'خط شريخان - موصل', sub: 'كيا سيفيا - انطلاق كل 15 دقيقة', tel: '0772XXXXXXX', cat: 'نقل عام', color: 'bg-green-100 text-green-600' },
                { name: 'تاكسي السلام', sub: 'توصيل داخل وخارج المنطقة', tel: '0773XXXXXXX', cat: 'تاكسي', color: 'bg-gray-100 text-gray-600' }
            ],
            prices: [
                { name: 'كيلو لحم غنم', sub: 'السعر: 18,000 د.ع', cat: 'لحوم', color: 'bg-red-100 text-red-600' },

            ],
            education: [

            ],
            health: [
                { name: 'عيادة د. محمد', sub: 'باطنية وأطفال - شارع السوق', tel: '0776XXXXXXX', cat: 'عيادة', color: 'bg-pink-100 text-pink-600' },
                { name: 'صيدلية الوفاء', sub: 'متوفر علاج الأمراض المزمنة', tel: '0777XXXXXXX', cat: 'صيدلية', color: 'bg-red-100 text-red-600' }
            ],
            sports: [
                { name: 'ملعب شريخان الدولي', sub: 'حجز الملعب الخماسي المسائي', tel: '0778XXXXXXX', cat: 'ملاعب', color: 'bg-emerald-100 text-emerald-600' },

            ],
            ads: [

                { name: 'مولدة باركنز 20 كي في', sub: 'نظيفة جداً - سعر مناسب', tel: '0781XXXXXXX', cat: 'أدوات', color: 'bg-stone-100 text-stone-600' }
            ],
            archive: [
                { name: 'جامع شريخان الكبير (1980)', sub: 'صورة نادرة للمنطقة قديماً', cat: 'تاريخ', color: 'bg-teal-100 text-teal-600' }
            ],
            alerts: [
                { name: 'موعد سيارة البلدية', sub: 'غداً الساعة 9 صباحاً في حي المعلمين', cat: 'خدمات', color: 'bg-red-50 text-red-600' },
                { name: 'توزيع النفط الأبيض', sub: 'بدأ التوزيع حسب البطاقة الوقودية', cat: 'وقود', color: 'bg-blue-50 text-blue-600' }
            ]
        };

        function showView(viewId) {
            const home = document.getElementById('home-view');
            const section = document.getElementById('section-view');
            const title = document.getElementById('section-title');
            const content = document.getElementById('section-content');

            home.classList.add('hidden');
            section.classList.remove('hidden');

            const viewTitles = {
                shops: 'دليل المحلات', services: 'أصحاب المهن', transport: 'النقل والمواصلات',
                prices: 'أسعار المسواك', education: 'التعليم والتدريس', health: 'العيادات والصيدليات',
                sports: 'الرياضة والشباب', ads: 'سوق شريخان المفتوح', archive: 'تاريخ شريخان',
                alerts: 'التنبيهات العاجلة', search: 'بحث سريع'
            };

            title.innerText = viewTitles[viewId] || 'تفاصيل القسم';
            content.innerHTML = '';

            if (database[viewId]) {
                database[viewId].forEach(item => {
                    content.innerHTML += `
                        <div class="bg-white p-5 rounded-[2rem] shadow-sm flex items-center justify-between border border-gray-50">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 ${item.color} rounded-2xl flex items-center justify-center text-lg font-bold">
                                    ${item.name.charAt(0)}
                                </div>
                                <div>
                                    <div class="flex items-center gap-2">
                                        <h4 class="font-800 text-gray-800 text-sm">${item.name}</h4>
                                        <span class="category-badge ${item.color}">${item.cat}</span>
                                    </div>
                                    <p class="text-[10px] text-gray-500 mt-1">${item.sub}</p>
                                </div>
                            </div>
                            ${item.tel ? `<button onclick="window.open('tel:${item.tel}')" class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center shadow-sm"><i class="fas fa-phone"></i></button>` : ''}
                        </div>
                    `;
                });
            } else {
                content.innerHTML = '<p class="text-center text-gray-400 py-10">لا توجد بيانات حالياً</p>';
            }
        }

        function goHome() {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('section-view').classList.add('hidden');
        }

        // Live Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
        }, 1000);

    </script>
</body>
</html>
